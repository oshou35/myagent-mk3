<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>myagent mk3</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%23242b45'/%3E%3Crect x='5' y='7' width='22' height='18' fill='%2370d85d'/%3E%3Crect x='9' y='11' width='14' height='10' fill='%23f7d774'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="styles.css?v=retro-rpg-2">
</head>
<body>
  <main class="game-shell" aria-label="myagent mk3 retro office mock">
    <header class="game-header">
      <div class="badge">m3</div>
      <div class="title-block">
        <span>myagent mk3</span>
        <strong>Agent Company RPG</strong>
      </div>
      <div class="build-stamp">独立モック</div>
    </header>

    <section class="game-card">
      <div class="hud" aria-label="Company status">
        <div><span>DAY</span><strong>20</strong></div>
        <div><span>資金</span><strong>38,400</strong></div>
        <div><span>信頼</span><strong>B+</strong></div>
        <div><span>未対応</span><strong>3</strong></div>
        <div><span>稼働</span><strong>2/4</strong></div>
      </div>

      <section class="screen-frame" aria-label="Retro office field">
        <canvas id="gameCanvas" width="960" height="640"></canvas>
        <div class="screen-lines" aria-hidden="true"></div>
        <div class="field-tip" id="fieldTip">フィールドをクリックして調べる</div>
      </section>

      <section class="dialog-window" aria-live="polite">
        <div class="portrait" id="portrait" aria-hidden="true"></div>
        <div class="dialog-body">
          <div class="dialog-title" id="dialogTitle">社長室からのお知らせ</div>
          <p id="dialogText">mk2の学びを、Agent開発会社の施設と社員育成に置き換えました。掲示板・社員・施設をクリックできます。</p>
          <div class="stat-line" id="statLine">
            <span>品質+2</span><span>知識+1</span><span>安全確認</span>
          </div>
        </div>
      </section>

      <nav class="command-menu" aria-label="Game commands">
        <button class="command active" type="button" data-command="hq">本社</button>
        <button class="command" type="button" data-command="jobs">案件</button>
        <button class="command" type="button" data-command="agents">社員</button>
        <button class="command" type="button" data-command="facilities">施設</button>
        <button class="command" type="button" data-command="reports">決算</button>
      </nav>
    </section>

    <section class="status-board" aria-label="mk2 learning summary">
      <article>
        <span>WORKFLOW</span>
        <strong>17</strong>
        <small>作業ラインとして表現</small>
      </article>
      <article>
        <span>PROCEDURE</span>
        <strong>40</strong>
        <small>マニュアル棚で育成</small>
      </article>
      <article>
        <span>REPORTS</span>
        <strong>20</strong>
        <small>決算室で改善材料化</small>
      </article>
    </section>
  </main>
  <script src="script.js?v=retro-rpg-2"></script>
</body>
</html>
